<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZETESIS</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .center {
      height: 100%;
      display: grid;
      place-items: center;
    }
    .word {
      font-size: clamp(40px, 8vw, 96px);
      letter-spacing: 0.08em;
      white-space: nowrap;
      position: relative;
    }
    .cursor {
      display: inline-block;
      width: 0.6ch;
      margin-left: 0.2ch;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    
    /* Social icons styling */
    .social-icons {
      position: fixed;
      bottom: 30px;
      left: 50%;
      display: flex;
      gap: 30px;
    }
    .social-icons a {
      color: #fff;
      font-size: 32px;
      transition: color 0.3s ease, transform 0.3s ease, opacity 0.8s ease;
      text-decoration: none;
      opacity: 0;
      transform: translateY(10px);
    }
    .social-icons a.show {
      opacity: 1;
      transform: translateY(0);
    }
    .social-icons a:hover {
      color: #888;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="word"><span id="out"></span><span class="cursor">▌</span></div>
  </div>
  
  <!-- Social Icons -->
  <div class="social-icons" id="social">
    <a href="mailto:hey@zetesis.co" title="Email" aria-label="Email" id="icon-0">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 7L12 13 2 7"/>
      </svg>
    </a>
    <a href="https://x.com/heyzetesis" target="_blank" title="Twitter" aria-label="Twitter" id="icon-1">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
    <a href="https://www.instagram.com/heyzetesis/" target="_blank" title="Instagram" aria-label="Instagram" id="icon-2">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </a>
  </div>

<script>
  const text = "zetesis";
  const out = document.getElementById("out");
  const social = document.getElementById("social");
  
  // Slower, gentle "human" typing delays (milliseconds)
  const delays = {
    z: 180,
    e: 170,
    t: 175,
    s: 210,
    i: 260 // a bit slower for "i"
  };
  
  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  
  let idx = 0;
  function typeNext() {
    if (idx >= text.length) {
      // Typing complete - center icons under just "zetesis" (not including cursor)
      centerIconsUnderText();
      showIconsSequentially();
      return;
    }
    const ch = text[idx];
    out.textContent += ch;
    const base = delays[ch] ?? 190;
    const jitter = rand(-15, 35);
    idx++;
    setTimeout(typeNext, Math.max(120, base + jitter));
  }
  
  function centerIconsUnderText() {
    // Get the width of just the "zetesis" text (without cursor)
    const textWidth = out.getBoundingClientRect().width;
    const socialWidth = social.getBoundingClientRect().width;
    
    // Calculate offset: half of text width minus half of social icons width
    const offset = (textWidth / 2) - (socialWidth / 2);
    
    // Apply the offset
    social.style.transform = `translateX(calc(-50% + ${offset}px))`;
  }
  
  function showIconsSequentially() {
    const icons = [
      document.getElementById('icon-0'),
      document.getElementById('icon-1'),
      document.getElementById('icon-2')
    ];
    
    // Delay before first icon appears
    let delay = 800;
    
    icons.forEach((icon, index) => {
      setTimeout(() => {
        icon.classList.add('show');
      }, delay + (index * 600)); // 600ms gap between each icon
    });
  }
  
  setTimeout(typeNext, 600);
</script>
</body>
</html>
