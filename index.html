<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZETESIS</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .center {
      height: 100%;
      display: grid;
      place-items: center;
    }
    .word {
      font-size: clamp(40px, 8vw, 96px);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .cursor {
      display: inline-block;
      width: 0.6ch;
      margin-left: 0.2ch;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="word"><span id="out"></span><span class="cursor">▌</span></div>
  </div>

<script>
  const text = "zetesis";
  const out = document.getElementById("out");

  // Slower, gentle “human” typing delays (milliseconds)
  const delays = {
    z: 180,
    e: 170,
    t: 175,
    s: 210,
    i: 260 // a bit slower for "i"
  };

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  let idx = 0;

  function typeNext() {
    if (idx >= text.length) return;

    const ch = text[idx];
    out.textContent += ch;

    const base = delays[ch] ?? 190;
    const jitter = rand(-15, 35); // small randomness, still calm
    idx++;

    setTimeout(typeNext, Math.max(120, base + jitter));
  }

  setTimeout(typeNext, 600); // small delay before starting
</script>
</body>
</html>
