<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zetesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0d0b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wordmark {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(56px, 16vw, 100px);
    letter-spacing: -0.03em;
    color: #e8e2d8;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .mark { color: #c8a96e; }
  #cursor {
    display: inline-block;
    width: 2px;
    height: 0.75em;
    background: #c8a96e;
    margin-left: 3px;
    position: relative;
    top: 0.05em;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>
<div id="wordmark"><span id="text"></span><span id="cursor"></span></div>
<script>
  const textEl = document.getElementById('text');

  function render(chars) {
    textEl.innerHTML = chars.map(c =>
      c.gold ? `<span class="mark">${c.char}</span>` : c.char
    ).join('');
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));
  const TYPE  = 120;
  const BACK  = 90;
  const PAUSE = 1400;
  const GAP   = 110;

  async function typeEnd(cur, str, gold = false) {
    for (const ch of str) {
      cur.push({ char: ch, gold }); render(cur); await wait(TYPE);
    }
  }

  async function backspace(cur, n) {
    for (let i = 0; i < n; i++) {
      cur.pop(); render(cur); await wait(BACK); await wait(GAP);
    }
  }

  async function run() {
    while (true) {
      let cur = [];

      // 1. zetesis
      await typeEnd(cur, 'zetesis');
      await wait(PAUSE);

      // 2. backspace tesis + t (5) → ze, type /esis → ze/esis
      await backspace(cur, 5);
      cur.push({ char: '/', gold: true }); render(cur); await wait(TYPE);
      await typeEnd(cur, 'esis');
      await wait(PAUSE);

      // 3. backspace /esis (5) → ze, type \esis → ze\esis
      await backspace(cur, 5);
      cur.push({ char: '\\', gold: true }); render(cur); await wait(TYPE);
      await typeEnd(cur, 'esis');
      await wait(PAUSE);

      // 4. clear
      while (cur.length > 0) { cur.pop(); render(cur); await wait(BACK); }
      await wait(600);
    }
  }

  run();
</script>
</body>
</html>
